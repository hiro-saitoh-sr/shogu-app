const AUTH_SK = 'shogu_app_auth_user';
const SHEETS_ID_SK = 'shogu_app_sheets_id';

function decodeJwt(token) {
  try {
    const payload = token.split('.')[1];
    const binary  = atob(payload.replace(/-/g, '+').replace(/_/g, '/'));
    const utf8str = decodeURIComponent(
      binary.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
    );
    const decoded = JSON.parse(utf8str);
    return { name: decoded.name || decoded.email, email: decoded.email, picture: decoded.picture || '' };
  } catch(e) { return null; }
}

function loadAuthUser() {
  try { const v = sessionStorage.getItem(AUTH_SK); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function saveAuthUser(user) {
  try { if (user) sessionStorage.setItem(AUTH_SK, JSON.stringify(user)); else sessionStorage.removeItem(AUTH_SK); } catch(e) {}
}

/* ══════════════════════════════════════════
   Google Sheets 連携
══════════════════════════════════════════ */
async function sheetsRequest(token, spreadsheetId, path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
  };
  if (body !== null) opts.body = JSON.stringify(body);
  const url = spreadsheetId
    ? `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}${path}`
    : `https://sheets.googleapis.com/v4/spreadsheets${path}`;
  const res = await fetch(url, opts);
  if (!res.ok) {
    const errJson = await res.json().catch(() => ({}));
    const err = new Error(errJson.error?.message || `HTTP ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return res.json();
}

const SHEET_NAMES = {
  masters:              '顧問先マスタ',
  shogu_plan:           '処遇改善加算_計画書',
  shogu_report:         '処遇改善加算_実績報告書',
  rinji_plan:           '臨時補助金_計画書',
  rinji_report:         '臨時補助金_実績報告書',
};

const MASTER_FIELDS   = ['id','顧問先ナンバー','顧問先名','業種','賃金改善実施期間'];
const CHINGIN_OPTIONS = ['４月～３月','５月～４月','６月～５月','７月～６月'];

async function createSpreadsheet(token) {
  const body = {
    properties: { title: '処遇改善加算タスク管理システム' },
    sheets: Object.values(SHEET_NAMES).map(title => ({ properties: { title } })),
  };
  const res = await sheetsRequest(token, null, '', 'POST', body);
  return res.spreadsheetId;
}

async function ensureSheets(token, spreadsheetId) {
  const meta = await sheetsRequest(token, spreadsheetId, '');
  const existing = (meta.sheets || []).map(s => s.properties.title);
  const missing = Object.values(SHEET_NAMES).filter(n => !existing.includes(n));
  if (missing.length > 0) {
    await sheetsRequest(token, spreadsheetId, ':batchUpdate', 'POST', {
      requests: missing.map(title => ({ addSheet: { properties: { title } } })),
    });
  }
}

async function readSheet(token, spreadsheetId, sheetName, fields) {
  try {
    const cols = String.fromCharCode(64 + fields.length);
    const data = await sheetsRequest(token, spreadsheetId, `/values/${encodeURIComponent(sheetName + '!A1:' + cols)}`);
    const rows = data.values || [];
    if (rows.length < 2) return [];
    const [header, ...dataRows] = rows;
    return dataRows
      .filter(r => r.some(c => c !== ''))
      .map(r => {
        const obj = {};
        header.forEach((k, i) => { obj[k] = r[i] ?? ''; });
        if (obj.id !== '' && obj.id !== undefined) obj.id = Number(obj.id);
        return obj;
      });
  } catch(e) {
    if (e.status === 400) return [];
    throw e;
  }
}

async function writeSheet(token, spreadsheetId, sheetName, fields, rows) {
  const values = [
    fields,
    ...rows.map(r => fields.map(f => (r[f] != null ? String(r[f]) : ''))),
  ];
  await sheetsRequest(token, spreadsheetId, `/values/${encodeURIComponent(sheetName)}:clear`, 'POST');
  await sheetsRequest(
    token,
    spreadsheetId,
    `/values/${encodeURIComponent(sheetName + '!A1')}?valueInputOption=RAW`,
    'PUT',
    { values }
  );
}

function LoginScreen({ onLogin }) {
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const btnRef = useRef(null);

  useEffect(() => {
    let timer;
    function initGsi() {
      if (!window.google) { timer = setTimeout(initGsi, 200); return; }
      window.google.accounts.id.initialize({
        client_id: GSI_CLIENT_ID,
        callback: handleCredential,
        auto_select: false,
      });
      if (btnRef.current) {
        window.google.accounts.id.renderButton(btnRef.current, {
          theme: 'outline', size: 'large', text: 'signin_with', locale: 'ja', width: 340,
        });
      }
    }
    initGsi();
    return () => clearTimeout(timer);
  }, []);

  function handleCredential(response) {
    setLoading(true); setError('');
    const user = decodeJwt(response.credential);
    if (!user) { setError('認証情報の取得に失敗しました。'); setLoading(false); return; }
    if (!ALLOWED_EMAILS.includes(user.email)) {
      setError(`このアカウント（${user.email}）はアクセスが許可されていません。`);
      setLoading(false);
      window.google.accounts.id.disableAutoSelect();
      return;
    }
    saveAuthUser(user);
    onLogin(user);
  }

  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%)', display:'flex', alignItems:'center', justifyContent:'center'}}>
      <div className="login-card" style={{textAlign:'center'}}>

        <h1 style={{fontSize:'20px', fontWeight:'800', color:'#111827', marginBottom:'6px'}}>処遇改善加算タスク管理システム</h1>
        <p style={{fontSize:'15px', color:'#6b7280', marginBottom:'32px'}}>社会保険労務士齊藤事務所</p>
        <p style={{fontSize:'16px', fontWeight:'600', color:'#374151', marginBottom:'20px'}}>Googleアカウントでログイン</p>
        <div ref={btnRef} style={{display:'flex', justifyContent:'center', minHeight:'44px', marginBottom:'16px'}}></div>
        {loading && <p style={{fontSize:'15px', color:'#6b7280', marginTop:'8px'}}>認証中...</p>}
        {error && (
          <div style={{background:'#fee2e2', border:'1px solid #fca5a5', borderRadius:'8px', padding:'12px 16px', marginTop:'12px', fontSize:'15px', color:'#991b1b', fontWeight:'600'}}>

        )}

    </div>
  );
}

/* ══════════════════════════════════════════

function nextId(rows) {
  if (!rows || rows.length === 0) return 1;
  return Math.max(...rows.map(r => Number(r.id) || 0)) + 1;
}

function fmtDate(v) {
  if (!v) return '';
  return v.replace(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/, '$1/$2/$3');
}

/* ══════════════════════════════════════════
   届出管理 モーダル
══════════════════════════════════════════ */
const KUBUN_OPTIONS = ['介護保険', '障害'];
const TEISHUTSU_OPTIONS = ['自社で提出', '齊藤事務所で提出'];

/* ── フラット行 ↔ グループ変換 ── */
function flatToGroups(rows) {
  const map = new Map();
  const order = [];
  rows.forEach(r => {
    const gid = r['グループid'] != null && r['グループid'] !== '' ? Number(r['グループid']) : Number(r['id'] ?? 0);
    if (!map.has(gid)) {
      map.set(gid, {
        グループid:   gid,
        顧問先名:     r['顧問先名']     ?? '',
        打ち合わせ日: r['打ち合わせ日'] ?? '',
        納品日:       r['納品日']       ?? '',
        提出担当:     r['提出担当'] || r['提出方法'] || '自社で提出',
        提出日:       r['提出日']       ?? '',
        items: [],
      });
      order.push(gid);
    }
    map.get(gid).items.push({
      保険者id:     Number(r['保険者id'] ?? 0),
      区分:         r['区分']         ?? '介護保険',
      提出先:       r['提出先'] || r['保険者'] || '',
      サービス種別: r['サービス種別']  ?? '',
      提出先URL:    r['提出先URL'] || r['指定権者URL'] || '',
    });
  });
  return order.map(gid => map.get(gid));
}

function groupsToFlat(groups) {
  const flat = [];
  groups.forEach(g => {
    g.items.forEach(item => {
      flat.push({
        グループid:   g.グループid,
        保険者id:     item.保険者id,
        顧問先名:     g.顧問先名,
        打ち合わせ日: g.打ち合わせ日,
        納品日:       g.納品日,
        提出担当:     g.提出担当,
        提出日:       g.提出日,
        区分:         item.区分,
        提出先:       item.提出先,
        サービス種別: item.サービス種別,
        提出先URL:    item.提出先URL,
      });
    });
  });
  return flat;
}

/* 行完了判定 */
function isRowComplete(g, it) {
  const itemOk   = !!(it['区分'] && it['サービス種別'] && it['提出先'] && it['提出先URL']);
  const sharedOk = !!(g['打ち合わせ日'] && g['納品日'] && g['提出担当']);
  const teihiOk  = g['提出担当'] !== '齊藤事務所で提出' || !!g['提出日'];
  return itemOk && sharedOk && teihiOk;
}

          <div>
            <label style={{fontWeight:'700', display:'block', marginBottom:'5px'}}>提出担当</label>
            <select value={shared['提出担当']} onChange={e => setS('提出担当', e.target.value)}>
              {TEISHUTSU_OPTIONS.map(o => <option key={o}>{o}</option>)}
            </select>
          </div>
          {shared['提出担当'] === '齊藤事務所で提出' && (
            <div>
              <label style={{fontWeight:'700', display:'block', marginBottom:'5px'}}>提出日</label>

            </div>
          )}

        <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'8px'}}>

              <tr>
                {['区分','提出先（保険者）','サービス種別','提出先URL',''].map(h => (
                  <th key={h} style={thStyle}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {items.map((it, idx) => (
                <tr key={it.保険者id} style={{borderBottom:'1px solid #f3f4f6'}}>
                  <td style={tdStyle}>
                    <select value={it['区分']} onChange={e => setItem(idx,'区分',e.target.value)} style={{width:'100px'}}>
                      {KUBUN_OPTIONS.map(o => <option key={o}>{o}</option>)}
                    </select>
                  </td>
                  <td style={tdStyle}>
                    <input value={it['提出先']} onChange={e => setItem(idx,'提出先',e.target.value)} placeholder="例：東京都" style={{width:'110px'}} />
                  </td>
                  <td style={tdStyle}>
                    <input value={it['サービス種別']} onChange={e => setItem(idx,'サービス種別',e.target.value)} placeholder="例：訪問介護" style={{width:'110px'}} />
                  </td>
                  <td style={tdStyle}>
                    <input value={it['提出先URL']} onChange={e => setItem(idx,'提出先URL',e.target.value)} placeholder="https://..." style={{width:'140px'}} />
                  </td>
                  <td style={tdStyle}>
                    {items.length > 1 && (
                      <button className="btn btn-danger" style={{padding:'2px 8px', fontSize:'13px'}} onClick={() => removeItem(idx)}>✕</button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{display:'flex', gap:'12px', justifyContent:'flex-end'}}>
          <button className="btn btn-secondary" onClick={onClose}>キャンセル</button>
          <button className="btn btn-primary" onClick={handleSave}>保存</button>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   届出管理 テーブル
══════════════════════════════════════════ */
function DeliveryView({ rows, masters, isRinji, docType, onSave, onDelete }) {
  const [modal, setModal] = useState(null); // null | {mode:'add'} | {mode:'edit', group}
  const [filterDone, setFilterDone] = useState(false);

  const dateLabel = docType === '計画書' ? '計画書納品日' : '実績報告書納品日';
  const groups = useMemo(() => flatToGroups(rows), [rows]);
  const displayed = filterDone ? groups.filter(g => !g.items.every(it => isRowComplete(g, it))) : groups;

  function handleGroupSave(group) {
    const others = groups.filter(g => g.グループid !== group.グループid);
    const newGroups = modal.mode === 'add' ? [...groups, group] : [...others, group].sort((a,b) => a.グループid - b.グループid);
    onSave(groupsToFlat(newGroups));
    setModal(null);
  }

  const thS = {padding:'10px 12px', textAlign:'left', borderBottom:'2px solid #e5e7eb', whiteSpace:'nowrap', color:'#111827'};
  const cell = bg => ({padding:'8px 12px', whiteSpace:'nowrap', verticalAlign:'middle', ...(bg ? {background:bg} : {})});
  const merged = bg => ({padding:'8px 12px', whiteSpace:'nowrap', verticalAlign:'top', paddingTop:'12px', borderRight:'1px solid #e5e7eb', ...(bg ? {background:bg} : {})});

  return (
    <div>
      <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'16px', padding:'0 8px', flexWrap:'wrap'}}>
        <button className="btn btn-primary" style={{padding:'6px 16px'}} onClick={() => setModal({mode:'add'})}>＋ 追加</button>
        <label style={{display:'flex', alignItems:'center', gap:'8px', fontWeight:'600', cursor:'pointer'}}>
          <input type="checkbox" checked={filterDone} onChange={e => setFilterDone(e.target.checked)} style={{width:'18px', height:'18px'}} />
          完了を非表示
        </label>
        <span style={{fontSize:'14px', color:'#6b7280'}}>全{groups.length}件 / 表示{displayed.length}件</span>
      </div>
      <div className="table-wrap">
        <table style={{width:'100%', borderCollapse:'collapse', minWidth:'1100px'}}>
          <thead>
            <tr>
              {['顧問先名','区分','サービス種別','提出先','提出先URL','打ち合わせ日',dateLabel,'提出担当','提出日','操作'].map(h => (
                <th key={h} style={thS}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {displayed.length === 0 && (
              <tr><td colSpan={10} style={{textAlign:'center', padding:'32px', color:'#6b7280'}}>データがありません</td></tr>
            )}
            {displayed.map(g => {
              const rs = g.items.length;
              const groupDone = g.items.every(it => isRowComplete(g, it));
              const gBg = groupDone ? '#fef08a' : undefined;
              return g.items.map((it, idx) => {
                const rowDone = isRowComplete(g, it);
                const rBg = groupDone ? '#fef08a' : rowDone ? '#fed7aa' : undefined;
                return (
                  <tr key={`${g.グループid}-${it.保険者id}`}
                    style={{borderBottom: idx === rs-1 ? '2px solid #d1d5db' : '1px solid #f3f4f6'}}>
                    {/* 顧問先名（結合） */}
                    {idx === 0 && (
                      <td rowSpan={rs} style={merged(gBg)}>
                        <span style={{fontWeight:'700', color:'#111827'}}>{g.顧問先名}</span>
                        <button className="btn btn-secondary" style={{display:'block', padding:'2px 8px', fontSize:'12px', marginTop:'6px'}}
                          onClick={() => setModal({mode:'edit', group:g})}>編集</button>
                      </td>
                    )}
                    {/* 提出先ごとのセル */}
                    <td style={cell(rBg)}>
                      <span style={{background: it['区分']==='介護保険' ? '#dbeafe' : '#fce7f3', color: it['区分']==='介護保険' ? '#1e3a8a' : '#9d174d', padding:'2px 8px', borderRadius:'4px', fontWeight:'700', fontSize:'14px'}}>
                        {it['区分']}
                      </span>
                    </td>
                    <td style={cell(rBg)}>{it['サービス種別']}</td>
                    <td style={cell(rBg)}>{it['提出先']}</td>
                    <td style={cell(rBg)}>
                      {it['提出先URL'] ? <a href={it['提出先URL']} target="_blank" rel="noopener" style={{color:'#2563eb', textDecoration:'underline'}}>リンク</a> : ''}
                    </td>
                    {/* 進捗セル（結合） */}
                    {idx === 0 && <>
                      <td rowSpan={rs} style={merged(gBg)}>{fmtDate(g['打ち合わせ日'])}</td>
                      <td rowSpan={rs} style={merged(gBg)}>{fmtDate(g['納品日'])}</td>
                      <td rowSpan={rs} style={{...merged(gBg), fontSize:'14px'}}>{g['提出担当']}</td>
                      <td rowSpan={rs} style={merged(gBg)}>
                        {g['提出担当'] === '齊藤事務所で提出' ? fmtDate(g['提出日']) : ''}
                      </td>
                      <td rowSpan={rs} style={merged(gBg)}>
                        <button className="btn btn-danger" style={{padding:'3px 10px', fontSize:'13px'}}
                          onClick={() => { if (confirm('削除しますか？')) onDelete(g.グループid); }}>
                          削除
                        </button>
                      </td>
                    </>}
                  </tr>
                );
              });
            })}
          </tbody>
        </table>
      </div>
      {modal && (
        <DeliveryModal
          initial={modal.mode === 'edit' ? modal.group : null}
          allRows={rows}
          masters={masters}
          isRinji={isRinji}
          docType={docType}
          onSave={handleGroupSave}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   メインアプリ
══════════════════════════════════════════ */
function App() {
  const [currentUser, setCurrentUser] = useState(() => loadAuthUser());

  /* tabs */
  const [mainTab, setMainTab] = useState('処遇改善加算'); // '処遇改善加算' | '臨時の補助金'
  const [subTab,  setSubTab]  = useState('計画書');      // '計画書' | '実績報告書'
  const [view,    setView]    = useState('delivery');     // 'delivery' | 'master'

  /* data */
  const [masters,      setMasters]      = useState(INITIAL_MASTERS);
  const [shoguPlan,    setShoguPlan]    = useState([]);
  const [shoguReport,  setShoguReport]  = useState([]);
  const [rinjiPlan,    setRinjiPlan]    = useState([]);
  const [rinjiReport,  setRinjiReport]  = useState([]);

  /* sheets */
  const [sheetsId,     setSheetsId]     = useState(() => localStorage.getItem(SHEETS_ID_SK) || '');
  const [syncStatus,   setSyncStatus]   = useState('idle'); // idle|loading|saving|saved|error|noaccess
  const [syncError,    setSyncError]    = useState('');

  const accessTokenRef = useRef(null);
  const tokenClientRef = useRef(null);

  /* ── 現在のシート名 ── */
  const currentSheetName = useMemo(() => {
    if (mainTab === '処遇改善加算') return subTab === '計画書' ? SHEET_NAMES.shogu_plan    : SHEET_NAMES.shogu_report;
    return subTab === '計画書' ? SHEET_NAMES.rinji_plan : SHEET_NAMES.rinji_report;
  }, [mainTab, subTab]);

  const currentRows = useMemo(() => {
    if (mainTab === '処遇改善加算') return subTab === '計画書' ? shoguPlan    : shoguReport;
    return subTab === '計画書' ? rinjiPlan : rinjiReport;
  }, [mainTab, subTab, shoguPlan, shoguReport, rinjiPlan, rinjiReport]);

  const setCurrentRows = useCallback((rows) => {
    if (mainTab === '処遇改善加算') {
      if (subTab === '計画書') setShoguPlan(rows); else setShoguReport(rows);
    } else {
      if (subTab === '計画書') setRinjiPlan(rows); else setRinjiReport(rows);
    }
  }, [mainTab, subTab]);

  /* ── Sheets 全データ読み込み ── */
  const loadAll = useCallback(async (token, sid) => {
    const t = token || accessTokenRef.current;
    const s = sid   || sheetsId;
    if (!t || !s) return;
    setSyncStatus('loading'); setSyncError('');
    try {
      await ensureSheets(t, s);
      const [m, sp, sr, rp, rr] = await Promise.all([
        readSheet(t, s, SHEET_NAMES.masters,       MASTER_FIELDS),
        readSheet(t, s, SHEET_NAMES.shogu_plan,    DELIVERY_FIELDS),
        readSheet(t, s, SHEET_NAMES.shogu_report,  DELIVERY_FIELDS),
        readSheet(t, s, SHEET_NAMES.rinji_plan,    DELIVERY_FIELDS),
        readSheet(t, s, SHEET_NAMES.rinji_report,  DELIVERY_FIELDS),
      ]);
      setMasters(m); setShoguPlan(sp); setShoguReport(sr); setRinjiPlan(rp); setRinjiReport(rr);
      setSyncStatus('saved');
    } catch(e) {
      if (e.status === 401) { tokenClientRef.current?.requestAccessToken({ prompt: '' }); }
      else { setSyncStatus('error'); setSyncError('読み込みエラー: ' + e.message); }
    }
  }, [sheetsId]);

  /* ── Sheets 保存（指定シートのみ） ── */
  const saveSheet = useCallback(async (sheetName, fields, rows) => {
    const t = accessTokenRef.current;
    const s = sheetsId;
    if (!t || !s) return;
    setSyncStatus('saving'); setSyncError('');
    try {
      await writeSheet(t, s, sheetName, fields, rows);
      setSyncStatus('saved');
    } catch(e) {
      if (e.status === 401) { tokenClientRef.current?.requestAccessToken({ prompt: '' }); }
      else { setSyncStatus('error'); setSyncError('保存エラー: ' + e.message); }
    }
  }, [sheetsId]);

  /* ── スプレッドシート新規作成 ── */
  const handleCreateSheet = useCallback(async () => {
    const t = accessTokenRef.current;
    if (!t) { tokenClientRef.current?.requestAccessToken({ prompt: 'consent' }); return; }
    setSyncStatus('loading');
    try {
      const newId = await createSpreadsheet(t);
      localStorage.setItem(SHEETS_ID_SK, newId);
      setSheetsId(newId);
      setSyncStatus('saved');
      await loadAll(t, newId);
    } catch(e) {
      setSyncStatus('error'); setSyncError('スプレッドシート作成エラー: ' + e.message);
    }
  }, [loadAll]);

  /* ── OAuth2 トークン取得 ── */
  useEffect(() => {
    if (!currentUser) return;
    let timer;
    function initTokenClient() {
      if (!window.google?.accounts?.oauth2) { timer = setTimeout(initTokenClient, 300); return; }
      tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
        client_id: GSI_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file',
        callback: (response) => {
          if (response.error) { setSyncStatus('noaccess'); return; }
          accessTokenRef.current = response.access_token;
          const sid = localStorage.getItem(SHEETS_ID_SK) || '';
          if (sid) { loadAll(response.access_token, sid); }
          else     { setSyncStatus('noaccess'); }
        },
      });
      tokenClientRef.current.requestAccessToken({ prompt: '' });
    }
    initTokenClient();
    return () => clearTimeout(timer);
  }, [currentUser?.email, loadAll]);

  /* ── データ変更ハンドラ ── */
  function handleMastersSave(rows) {
    setMasters(rows);
    saveSheet(SHEET_NAMES.masters, MASTER_FIELDS, rows);
  }
  function handleMasterDelete(id) {
    const rows = masters.filter(r => r.id !== id);
    setMasters(rows);
    saveSheet(SHEET_NAMES.masters, MASTER_FIELDS, rows);
  }
  function handleDeliverySave(rows) {
    setCurrentRows(rows);
    saveSheet(currentSheetName, DELIVERY_FIELDS, rows);
  }
  function handleDeliveryDelete(gid) {
    const rows = currentRows.filter(r => Number(r['グループid'] ?? r['id'] ?? 0) !== gid);
    setCurrentRows(rows);
    saveSheet(currentSheetName, DELIVERY_FIELDS, rows);
  }

  /* ── ログイン前 ── */
  if (!currentUser) return <LoginScreen onLogin={u => setCurrentUser(u)} />;

  /* ── 同期ステータス表示 ── */
  function SyncBadge() {
    const base = {fontSize:'13px', fontWeight:'700', padding:'4px 10px', borderRadius:'5px', fontFamily:'inherit'};
    if (syncStatus === 'loading') return <span style={{...base, color:'#2563eb'}}>🔄 読込中…</span>;
    if (syncStatus === 'saving')  return <span style={{...base, color:'#d97706'}}>💾 保存中…</span>;
    if (syncStatus === 'saved')   return <span style={{...base, color:'#16a34a'}}>✅ 保存済み</span>;
    if (syncStatus === 'error')   return <span style={{...base, color:'#dc2626'}} title={syncError}>❌ エラー</span>;
    if (syncStatus === 'noaccess') {
      if (!sheetsId) {
        return (
          <button onClick={handleCreateSheet}
            style={{...base, border:'1px solid #2563eb', background:'#eff6ff', color:'#1d4ed8', cursor:'pointer'}}>
            ＋ スプレッドシートを新規作成
          </button>
        );
      }
      return (
        <button onClick={() => tokenClientRef.current?.requestAccessToken({ prompt: 'consent' })}
          style={{...base, border:'1px solid #f97316', background:'#fff7ed', color:'#c2410c', cursor:'pointer'}}>
          ⚠️ Sheetsと接続
        </button>
      );
    }
    return null;
  }

  return (
    <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
      {/* ヘッダー */}
      <header style={{background:'white', borderBottom:'1px solid #e5e7eb', padding:'10px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'8px'}}>
        <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
          <span style={{fontSize:'22px'}}>📋</span>
          <span style={{fontWeight:'800', fontSize:'19px'}}>処遇改善加算タスク管理システム</span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'12px', flexWrap:'wrap'}}>
          <SyncBadge />
          {sheetsId && (
            <a href={`https://docs.google.com/spreadsheets/d/${sheetsId}`} target="_blank" rel="noopener"
              style={{fontSize:'13px', color:'#2563eb', textDecoration:'underline'}}>
              Sheets
            </a>
          )}
          <button onClick={() => loadAll()} className="btn btn-secondary" style={{padding:'4px 12px', fontSize:'14px'}}>
            🔄 更新
          </button>
          <span style={{fontSize:'14px', color:'#374151'}}>社会保険労務士齊藤事務所</span>
          <button className="btn btn-secondary" style={{padding:'4px 12px', fontSize:'14px'}}
            onClick={() => { saveAuthUser(null); setCurrentUser(null); }}>
            ログアウト
          </button>
        </div>
      </header>

      {/* ナビゲーション */}
      <nav style={{background:'white', borderBottom:'1px solid #e5e7eb', padding:'0 20px', display:'flex', gap:'0', alignItems:'center'}}>
        {/* 顧問先マスタ */}
        <button
          className={`tab-btn ${view === 'master' ? 'tab-active' : ''}`}
          style={{padding:'12px 20px', background:'none', border:'none', borderBottom: view==='master' ? '3px solid #2563eb' : '3px solid transparent', cursor:'pointer', marginRight:'8px'}}
          onClick={() => setView('master')}>
          顧問先マスタ
        </button>
        {/* 大項目タブ */}
        {['処遇改善加算','臨時の補助金'].map(tab => (
          <button key={tab}
            className={`tab-btn ${view==='delivery' && mainTab===tab ? 'tab-active' : ''}`}
            style={{padding:'12px 20px', background:'none', border:'none', borderBottom: view==='delivery' && mainTab===tab ? '3px solid #2563eb' : '3px solid transparent', cursor:'pointer'}}
            onClick={() => { setView('delivery'); setMainTab(tab); }}>
            {tab}
          </button>
        ))}
      </nav>

      {/* 中項目タブ（届出管理のみ） */}
      {view === 'delivery' && (
        <div style={{background:'#f9fafb', borderBottom:'1px solid #e5e7eb', padding:'0 20px', display:'flex', gap:'0'}}>
          {['計画書','実績報告書'].map(tab => (
            <button key={tab}
              className={`tab-btn ${subTab===tab ? 'nav-active' : ''}`}
              style={{padding:'10px 20px', background: subTab===tab ? '#dbeafe' : 'none', border:'none', borderRadius:'6px 6px 0 0', cursor:'pointer', marginRight:'4px'}}
              onClick={() => setSubTab(tab)}>
              {tab}
            </button>
          ))}
        </div>
      )}

      {/* コンテンツ */}
      <main style={{flex:1, padding:'16px 20px', overflow:'hidden'}}>
        {view === 'master' ? (
          <MasterView masters={masters} onSave={handleMastersSave} onDelete={handleMasterDelete} />
        ) : (
          <DeliveryView
            rows={currentRows}
            masters={masters}
            isRinji={mainTab === '臨時の補助金'}
            docType={subTab}
            onSave={handleDeliverySave}
            onDelete={handleDeliveryDelete}
          />
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
